name: Build PRoot - All Static

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    container: alpine:latest
    
    steps:
      - name: Install git
        run: apk add --no-cache git
        
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          apk add --no-cache \
            make gcc musl-dev linux-headers \
            libarchive-dev talloc-dev uthash-dev \
            libarchive-static talloc-static \
            bsd-compat-headers
      
      - name: Apply fixes
        run: |
          sed -i '1i #include <libgen.h>' src/cli/cli.c
          sed -i '/^#include/i #include "mem.h"' src/tracee/tracee.c
      
      - name: Build
        run: |
          make -C src loader.elf build.h
          make -C src CFLAGS="-O3 -static" LDFLAGS="-static -ltalloc" proot
      
      - name: Rename
        run: |
          mv src/proot proot-alpine-x86_64
          chmod +x proot-alpine-x86_64
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: proot-alpine-x86_64
          path: proot-alpine-x86_64

  build-arm64:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      
      - name: Build in ARM64 container
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: alpine_latest
          install: |
            apk add --no-cache \
              git make gcc musl-dev linux-headers \
              libarchive-dev talloc-dev uthash-dev \
              libarchive-static talloc-static \
              bsd-compat-headers
          run: |
            sed -i '1i #include <libgen.h>' src/cli/cli.c
            sed -i '/^#include/i #include "mem.h"' src/tracee/tracee.c
            make -C src loader.elf build.h
            make -C src CFLAGS="-O3 -static" LDFLAGS="-static -ltalloc" proot
            mv src/proot proot-alpine-arm64
            chmod +x proot-alpine-arm64
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: proot-alpine-arm64
          path: proot-alpine-arm64

  release:
    needs: [build-x86_64, build-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: List
        run: ls -lh artifacts/
      
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/proot-*
          generate_release_notes: true
          name: "PRoot ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
