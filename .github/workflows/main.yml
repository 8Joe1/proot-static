name: Build PRoot Static

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build static PRoot
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            PLATFORM="linux/arm64"
            IMAGE="arm64v8/alpine"
            OUT="proot-alpine-arm64"
          else
            PLATFORM="linux/amd64"
            IMAGE="alpine"
            OUT="proot-alpine-x86_64"
          fi

          docker run --rm --platform $PLATFORM \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            $IMAGE sh -c "

            apk add --no-cache \
              git make gcc musl-dev linux-headers \
              libarchive-dev talloc-dev uthash-dev \
              libarchive-static talloc-static \
              bsd-compat-headers

            git config --global --add safe.directory /workspace

            sed -i '1i #include <libgen.h>' src/cli/cli.c
            sed -i '/^#include/i #include \"mem.h\"' src/tracee/tracee.c

            make -C src loader.elf loader-m32.elf build.h

            sed -i 's/SYSVIPC 0/SYSVIPC 1/g' src/build.h
            sed -i 's/ENABLE_SYSVIPC 0/ENABLE_SYSVIPC 1/g' src/build.h || true

            make -C src CFLAGS='-O2 -static -s' LDFLAGS='-static' proot

            strip src/proot
            cp src/proot $OUT
            chmod +x $OUT
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-${{ matrix.arch }}
          path: proot-alpine-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: proot-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
