name: Build Static Binaries (Cross Compile)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Setup Git
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        if [ -z "$(git tag -l)" ]; then
          git config user.email "ci@example.com"
          git config user.name "CI Bot"
          git tag -a "v0.0.1-temp" -m "Temporary tag for build"
        fi

    - name: Install cross compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu make git wget

    - name: Build libtalloc for aarch64
      run: |
        mkdir -p /tmp/talloc-build
        cd /tmp/talloc-build
        
        wget https://www.samba.org/ftp/talloc/talloc-2.4.0.tar.gz
        tar -xzf talloc-2.4.0.tar.gz
        cd talloc-2.4.0
        
        # Cross compile libtalloc static
        CC=aarch64-linux-gnu-gcc \
        ./configure --host=aarch64-linux-gnu \
                    --disable-shared \
                    --enable-static \
                    --prefix=/tmp/talloc-aarch64
        make
        make install
        
        ls -la /tmp/talloc-aarch64/lib/

    - name: Build proot
      run: |
        cd src
        make clean || true
        
        export CC=aarch64-linux-gnu-gcc
        export CFLAGS="-O2 -static -D_FILE_OFFSET_BITS=64 -D_GNU_SOURCE -I/tmp/talloc-aarch64/include"
        export LDFLAGS="-static -L/tmp/talloc-aarch64/lib"
        
        make -j$(nproc) \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LIBS="-ltalloc" \
          PYTHON=""

    - name: Check and upload
      run: |
        cd src
        file proot
        aarch64-linux-gnu-strip proot
        ls -la proot

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: proot-static-aarch64
        path: src/proot
        if-no-files-found: error
