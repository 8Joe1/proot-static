name: Build Static Binaries (Alpine)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Setup Git
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        if [ -z "$(git tag -l)" ]; then
          git config user.email "ci@example.com"
          git config user.name "CI Bot"
          git tag -a "v0.0.1-temp" -m "Temporary tag for build"
        fi

    - name: Build in Alpine ARM64 container
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: aarch64
        distro: alpine_latest
        githubToken: ${{ github.token }}
        run: |
          apk update
          apk add gcc musl-dev make git linux-headers talloc-dev talloc-static
          
          cd src
          make clean || true
          
          # Alpine uses musl which is better for static linking
          make -j$(nproc) \
            CFLAGS="-O2 -static -D_FILE_OFFSET_BITS=64 -D_GNU_SOURCE" \
            LDFLAGS="-static" \
            LIBS="-ltalloc" \
            PYTHON=""
          
          file proot
          strip proot
          ls -la proot

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: proot-static-aarch64
        path: src/proot
        if-no-files-found: error
