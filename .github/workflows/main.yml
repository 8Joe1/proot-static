name: Build Static Binaries (Ubuntu)

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu git make libtalloc-dev

      - name: Build Static PRoot
        run: |
          cd src
          # الحقن لملفات الهيدر اللي وقفتنا قبل كدة (للاحتياط)
          sed -i '1i #include <libgen.h>' cli/cli.c
          sed -i '1i #include "../ptrace/ptrace.h"\n#include "../tracee/reg.h"' tracee/tracee.c
          
          make clean
          
          # أهم سطر: بنعطل البايثون وبنطلب بناء Static
          make CROSS_COMPILE=aarch64-linux-gnu- \
               LDFLAGS="-static" \
               PYTHON_VERSION=0 \
               V=1
               
          mv proot ../proot-aarch64-static

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-aarch64-static
          path: proot-aarch64-static
