name: Build Static Binaries (Cross Compile Fixed)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Setup Git
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu make git wget

    - name: Build libtalloc minimal
      run: |
        mkdir -p /tmp/talloc-minimal
        cd /tmp/talloc-minimal
        
        cat > talloc.c << 'EOF'
        #define _GNU_SOURCE
        #include <stdlib.h>
        #include <string.h>
        #include <stdio.h>
        #include <stdarg.h>
        
        void *_talloc(const void *ctx, size_t size) { (void)ctx; return malloc(size); }
        void *_talloc_zero(const void *ctx, size_t size) { (void)ctx; return calloc(1, size); }
        void *_talloc_memdup(const void *ctx, const void *p, size_t size) { 
          (void)ctx; void *r = malloc(size); if(r) memcpy(r, p, size); return r; 
        }
        char *talloc_strdup(const void *ctx, const char *s) { 
          (void)ctx; return s ? strdup(s) : NULL; 
        }
        char *talloc_strndup(const void *ctx, const char *s, size_t n) { 
          (void)ctx; return s ? strndup(s, n) : NULL; 
        }
        char *talloc_asprintf(const void *ctx, const char *fmt, ...) {
          va_list ap; char *r; va_start(ap, fmt); r = talloc_vasprintf(ctx, fmt, ap); va_end(ap); return r;
        }
        char *talloc_vasprintf(const void *ctx, const char *fmt, va_list ap) {
          (void)ctx; char *r = NULL; vasprintf(&r, fmt, ap); return r;
        }
        void *talloc_realloc(const void *ctx, void *p, size_t size) { (void)ctx; return realloc(p, size); }
        int _talloc_free(void *p) { free(p); return 0; }
        void talloc_set_name_const(const void *p, const char *n) { (void)p; (void)n; }
        const char *talloc_get_name(const void *p) { (void)p; return "talloc"; }
        void *talloc_named_const(const void *ctx, size_t size, const char *n) { 
          (void)n; return _talloc_zero(ctx, size); 
        }
        void *talloc_parent(const void *p) { (void)p; return NULL; }
        size_t talloc_get_size(const void *p) { return p ? 4096 : 0; }
        void *_talloc_get_type_abort(const void *p, const char *n) { (void)n; return (void*)p; }
        void *_talloc_reference_loc(const void *ctx, const void *p, const char *l) { 
          (void)ctx; (void)l; return (void*)p; 
        }
        int talloc_reference_count(const void *p) { (void)p; return 1; }
        void _talloc_set_destructor(const void *p, int (*d)(void*)) { (void)p; (void)d; }
        void talloc_report_depth_cb(const void *p, int d, int m, void (*cb)(const void*,int,int,void*), void *x) { 
          (void)p; (void)d; (void)m; (void)cb; (void)x; 
        }
        void talloc_report_depth_file(const void *p, int d, int m, FILE *f) { 
          (void)p; (void)d; (void)m; (void)f; 
        }
        void *talloc_autofree_context(void) { static int x; return &x; }
        void *talloc_ptrtype(const void *ctx, const void *p) { (void)ctx; return (void*)p; }
        EOF
        
        aarch64-linux-gnu-gcc -c -O2 -fPIC talloc.c -o talloc.o
        aarch64-linux-gnu-ar rcs libtalloc.a talloc.o
        
        mkdir -p /tmp/talloc-aarch64/lib /tmp/talloc-aarch64/include
        cp libtalloc.a /tmp/talloc-aarch64/lib/
        
        cat > /tmp/talloc-aarch64/include/talloc.h << 'EOF'
        #ifndef _TALLOC_H_
        #define _TALLOC_H_
        #include <stddef.h>
        #include <stdarg.h>
        #include <stdio.h>
        #ifdef __cplusplus
        extern "C" {
        #endif
        void *_talloc(const void *ctx, size_t size);
        void *_talloc_zero(const void *ctx, size_t size);
        void *_talloc_memdup(const void *t, const void *p, size_t size);
        char *talloc_strdup(const void *t, const char *p);
        char *talloc_strndup(const void *t, const char *p, size_t n);
        char *talloc_asprintf(const void *t, const char *fmt, ...) __attribute__((format(printf,2,3)));
        char *talloc_vasprintf(const void *t, const char *fmt, va_list ap) __attribute__((format(printf,2,0)));
        void *talloc_realloc(const void *ctx, void *p, size_t size);
        int _talloc_free(void *ptr);
        #define talloc_free(ptr) _talloc_free(ptr)
        void talloc_set_name_const(const void *ptr, const char *name);
        const char *talloc_get_name(const void *ptr);
        void *talloc_named_const(const void *ctx, size_t size, const char *name);
        void *talloc_parent(const void *ptr);
        size_t talloc_get_size(const void *ptr);
        void *_talloc_get_type_abort(const void *ptr, const char *name);
        void *_talloc_reference_loc(const void *ctx, const void *ptr, const char *location);
        #define talloc_reference(ctx, ptr) _talloc_reference_loc(ctx, ptr, __FILE__)
        int talloc_reference_count(const void *ptr);
        void _talloc_set_destructor(const void *ptr, int (*destructor)(void*));
        void talloc_report_depth_cb(const void *ptr, int depth, int max_depth, void (*callback)(const void*,int,int,void*), void *priv);
        void talloc_report_depth_file(const void *ptr, int depth, int max_depth, FILE *f);
        void *talloc_autofree_context(void);
        void *talloc_ptrtype(const void *ctx, const void *p);
        #define talloc(ctx, type) (type *)_talloc(ctx, sizeof(type))
        #define talloc_array(ctx, type, count) (type *)_talloc(ctx, sizeof(type) * count)
        #define talloc_zero(ctx, type) (type *)_talloc_zero(ctx, sizeof(type))
        #define talloc_zero_array(ctx, type, count) (type *)_talloc_zero(ctx, (sizeof(type) * count))
        #define talloc_size(ctx, size) _talloc(ctx, size)
        #define talloc_zero_size(ctx, size) _talloc_zero(ctx, size)
        #ifdef __cplusplus
        }
        #endif
        #endif
        EOF

    - name: Fix source code and build
      run: |
        cd src
        
        # إصلاح الـ missing header
        if ! grep -q '#include "tracee/mem.h"' tracee/tracee.c; then
          sed -i '1i#include "tracee/mem.h"' tracee/tracee.c
        fi
        
        # إصلاحات إضافية محتملة
        if ! grep -q '#include "tracee/mem.h"' tracee/reg.c; then
          sed -i '1i#include "tracee/mem.h"' tracee/reg.c
        fi
        
        make clean 2>/dev/null || true
        
        export CC=aarch64-linux-gnu-gcc
        export CFLAGS="-O2 -static -D_FILE_OFFSET_BITS=64 -D_GNU_SOURCE -I/tmp/talloc-aarch64/include -Wno-deprecated-declarations"
        export LDFLAGS="-static -L/tmp/talloc-aarch64/lib"
        
        make -j$(nproc) \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LIBS="-ltalloc" \
          PYTHON=""

    - name: Check and upload
      run: |
        cd src
        file proot
        aarch64-linux-gnu-strip proot
        ls -la proot

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: proot-static-aarch64
        path: src/proot
        if-no-files-found: error
