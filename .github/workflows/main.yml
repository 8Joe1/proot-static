name: Build Static Binaries (Alpine Fixed)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Build in Alpine ARM64 container
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: aarch64
        distro: alpine_latest
        githubToken: ${{ github.token }}
        install: |
          apk update
          apk add git gcc musl-dev make linux-headers talloc-dev talloc-static bsd-compat-headers
        run: |
          # إصلاح ملكية Git
          git config --global --add safe.directory /home/runner/work/proot-static/proot-static
          
          cd src
          make clean || true
          
          # البناء مع musl (static by default)
          make -j$(nproc) \
            CFLAGS="-O2 -static -D_FILE_OFFSET_BITS=64 -D_GNU_SOURCE" \
            LDFLAGS="-static" \
            LIBS="-ltalloc" \
            PYTHON=""
          
          file proot
          strip proot
          ls -la proot

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: proot-static-aarch64
        path: src/proot
        if-no-files-found: error
