name: Build PRoot - All Static with SYSVIPC

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    container: alpine:latest
    
    steps:
      - name: Install git
        run: apk add --no-cache git
        
      - uses: actions/checkout@v4
      
      - name: Fix git ownership
        run: git config --global --add safe.directory /__w/proot-static/proot-static
      
      - name: Install dependencies
        run: |
          apk add --no-cache \
            make gcc musl-dev linux-headers \
            libarchive-dev talloc-dev uthash-dev \
            libarchive-static talloc-static \
            bsd-compat-headers
      
      - name: Apply fixes
        run: |
          sed -i '1i #include <libgen.h>' src/cli/cli.c
          sed -i '/^#include/i #include "mem.h"' src/tracee/tracee.c
      
      - name: Build loader and config
        run: |
          make -C src loader.elf loader-m32.elf build.h
      
      - name: Build proot with all extensions
        run: |
          make -C src \
            CFLAGS="-O3 -static -DCONFIG_SYSVIPC -DCONFIG_CARE -DCONFIG_PORTMAP -DCONFIG_LINK2SYMLINK -DCONFIG_FAKE_ID0" \
            LDFLAGS="-static -ltalloc" \
            proot
      
      - name: Rename
        run: |
          mv src/proot proot-alpine-x86_64
          chmod +x proot-alpine-x86_64
          ./proot-alpine-x86_64 --help | grep -E "sysvipc|link2symlink|portmap|fake_id0" || true
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: proot-alpine-x86_64
          path: proot-alpine-x86_64

  build-arm64:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      
      - name: Build in ARM64 container
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: alpine_latest
          install: |
            apk add --no-cache \
              git make gcc musl-dev linux-headers \
              libarchive-dev talloc-dev uthash-dev \
              libarchive-static talloc-static \
              bsd-compat-headers
          run: |
            git config --global --add safe.directory /home/runner/work/proot-static/proot-static
            sed -i '1i #include <libgen.h>' src/cli/cli.c
            sed -i '/^#include/i #include "mem.h"' src/tracee/tracee.c
            make -C src loader.elf build.h
            make -C src \
              CFLAGS="-O3 -static -DCONFIG_SYSVIPC -DCONFIG_CARE -DCONFIG_PORTMAP -DCONFIG_LINK2SYMLINK -DCONFIG_FAKE_ID0" \
              LDFLAGS="-static -ltalloc" \
              proot
            mv src/proot proot-alpine-arm64
            chmod +x proot-alpine-arm64
            ./proot-alpine-arm64 --help | grep -E "sysvipc|link2symlink|portmap|fake_id0" || true
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: proot-alpine-arm64
          path: proot-alpine-arm64

  release:
    needs: [build-x86_64, build-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: List and check
        run: |
          ls -lh artifacts/
          for f in artifacts/proot-*; do
            echo "=== $f ==="
            $f --help 2>&1 | grep -E "Options:|Extensions:" -A 30 || true
          done
      
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/proot-*
          generate_release_notes: true
          name: "PRoot ${{ github.ref_name }} - Full Featured"
          body: |
            ## PRoot Static Builds with All Extensions
            
            | Platform | Architecture | Features |
            |----------|-------------|----------|
            | Alpine Linux | x86_64 | ✅ SYSVIPC, link2symlink, portmap, fake_id0 |
            | Alpine Linux | ARM64 | ✅ SYSVIPC, link2symlink, portmap, fake_id0 |
            
            ### Extensions Included:
            - `--sysvipc` : System V IPC support
            - `--link2symlink` : Hard link to symlink conversion
            - `--port` : Port mapping
            - `-0` : Fake root privileges
            
            ### Usage:
            ```bash
            ./proot-alpine-arm64 --sysvipc -R /path/to/rootfs /bin/sh
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
