name: Build Static Binaries (Ubuntu)

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libtalloc-dev git make

      - name: Build Static PRoot
        run: |
          cd src
          make clean
          # بنستخدم الـ Cross compiler وبنطلب Static linking
          make CROSS_COMPILE=aarch64-linux-gnu- LDFLAGS="-static" V=1
          mv proot ../proot-aarch64-static

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-aarch64-static
          path: proot-aarch64-static
