name: Build PRoot Static

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:

  build-x86_64:
    runs-on: ubuntu-latest
    container: alpine:latest

    steps:
      - name: Install tools
        run: apk add --no-cache git

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apk add --no-cache \
            make gcc musl-dev linux-headers \
            libarchive-dev talloc-dev uthash-dev \
            libarchive-static talloc-static \
            bsd-compat-headers

      - name: Apply source fixes
        run: |
          sed -i '1i #include <libgen.h>' src/cli/cli.c
          sed -i '/^#include/i #include "mem.h"' src/tracee/tracee.c

      - name: Build loader
        run: make -C src loader.elf loader-m32.elf build.h

      - name: Enable SYSVIPC
        run: |
          sed -i 's/SYSVIPC 0/SYSVIPC 1/g' src/build.h
          sed -i 's/ENABLE_SYSVIPC 0/ENABLE_SYSVIPC 1/g' src/build.h || true
          grep -i sysv src/build.h

      - name: Build static proot
        run: |
          make -C src \
          CFLAGS="-O2 -static -s" \
          LDFLAGS="-static" \
          -j1 proot

      - name: Prepare binary
        run: |
          cp src/proot proot-alpine-x86_64
          chmod +x proot-alpine-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-x86_64
          path: proot-alpine-x86_64


  build-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build ARM64 version
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/alpine:latest \
            sh -c "

            apk add --no-cache \
              git make gcc musl-dev linux-headers \
              libarchive-dev talloc-dev uthash-dev \
              libarchive-static talloc-static \
              bsd-compat-headers

            git config --global --add safe.directory /workspace

            sed -i '1i #include <libgen.h>' src/cli/cli.c
            sed -i '/^#include/i #include \"mem.h\"' src/tracee/tracee.c

            make -C src loader.elf loader-m32.elf build.h

            sed -i 's/SYSVIPC 0/SYSVIPC 1/g' src/build.h
            sed -i 's/ENABLE_SYSVIPC 0/ENABLE_SYSVIPC 1/g' src/build.h || true

            make -C src \
            CFLAGS='-O2 -static -s' \
            LDFLAGS='-static' \
            -j1 proot

            cp src/proot proot-alpine-arm64
            chmod +x proot-alpine-arm64
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-arm64
          path: proot-alpine-arm64


  release:
    needs: [build-x86_64, build-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: proot-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
