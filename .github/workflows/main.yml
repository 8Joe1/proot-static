name: Build PRoot Alpine Static

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: alpine:latest
    
    steps:
      - name: Install git first
        run: apk add --no-cache git
        
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install dependencies
        run: |
          apk add --no-cache \
            make gcc musl-dev linux-headers \
            libarchive-dev talloc-dev uthash-dev \
            libarchive-static talloc-static \
            bsd-compat-headers  # <-- مهم عشان sys/queue.h
      
      - name: Apply fixes
        run: |
          sed -i '1i #include <libgen.h>' src/cli/cli.c
          sed -i '/^#include/i #include "mem.h"' src/tracee/tracee.c
      
      - name: Build
        run: |
          make -C src loader.elf build.h
          make -C src CFLAGS="-O3 -static" LDFLAGS="-static" proot
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: proot-static
          path: src/proot
          
