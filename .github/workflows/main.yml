name: Build PRoot - All Static

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: alpine:latest
            name: alpine-x86_64
            arch: x86_64
            
          - container: arm64v8/alpine:latest
            name: alpine-arm64
            arch: arm64

    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    
    steps:
      - name: Install git
        run: apk add --no-cache git
        
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          apk add --no-cache \
            make gcc musl-dev linux-headers \
            libarchive-dev talloc-dev uthash-dev \
            libarchive-static talloc-static \
            bsd-compat-headers
      
      - name: Apply fixes
        run: |
          sed -i '1i #include <libgen.h>' src/cli/cli.c
          sed -i '/^#include/i #include "mem.h"' src/tracee/tracee.c
      
      - name: Build loader
        run: make -C src loader.elf build.h
      
      - name: Build proot static
        run: |
          make -C src \
            CFLAGS="-O3 -static" \
            LDFLAGS="-static -ltalloc" \
            proot
      
      - name: Rename binary
        run: |
          mv src/proot proot-${{ matrix.name }}
          chmod +x proot-${{ matrix.name }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-${{ matrix.name }}
          path: proot-${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: List artifacts
        run: ls -lh artifacts/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/proot-*
          generate_release_notes: true
          name: "PRoot ${{ github.ref_name }} - Static Builds"
          body: |
            ## PRoot Static Builds (musl libc)
            
            | Platform | Architecture | File |
            |----------|-------------|------|
            | Alpine Linux | x86_64 | `proot-alpine-x86_64` |
            | Alpine Linux | ARM64 | `proot-alpine-arm64` |
            
            ### Features:
            - ✅ Fully static (no dependencies)
            - ✅ Works on any Linux distro
            - ✅ Includes all extensions
            
            ### Usage:
            ```bash
            chmod +x proot-alpine-x86_64
            ./proot-alpine-x86_64 --version
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
