name: Build Static Binaries (Ubuntu Fixed)

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu git make libtalloc-dev

      - name: Build Static PRoot
        run: |
          cd src
          
          # 1. إزالة أي محاولة لاستدعاء Python من الماكفيل تماماً
          sed -i 's/HAS_PYTHON_EXTENSION :=.*/HAS_PYTHON_EXTENSION := 0/g' GNUmakefile
          sed -i 's/CHECK_PYTHON_CONFIG :=.*/CHECK_PYTHON_CONFIG := 0/g' GNUmakefile
          
          # 2. حقن الهيدرات اللي كانت بتعمل Errors في النسخ اللي فاتت
          sed -i '1i #include <libgen.h>' cli/cli.c
          sed -i '1i #include "../ptrace/ptrace.h"\n#include "../tracee/reg.h"' tracee/tracee.c
          
          make clean
          
          # 3. البناء باستخدام الـ Cross-compiler وطلب Static
          make CROSS_COMPILE=aarch64-linux-gnu- \
               LDFLAGS="-static" \
               V=1
               
          mv proot ../proot-aarch64-static

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-aarch64-static
          path: proot-aarch64-static
