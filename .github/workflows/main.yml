name: Build Static Binaries

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, armv7, x86_64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Static PRoot via QEMU
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: ${{ matrix.arch }}
          distro: alpine_latest
          run: |
            # 1. تحديث وتنصيب الأدوات اللازمة
            apk update
            apk add build-base linux-headers talloc-dev talloc-static coreutils make pkgconf bsd-compat-headers git
            
            # 2. حل مشكلة أمان Git في الحاوية
            git config --global --add safe.directory /home/runner/work/proot-static/proot-static
            
            # 3. معالجة الكود ليتوافق مع Alpine (دالة basename)
            # بنحشر هيدر libgen.h في ملف cli.c عشان الـ Compiler يشوف الدالة صح
            sed -i '1i #include <libgen.h>' src/cli/cli.c
            
            cd src
            make clean
            
            # 4. البناء الـ Static الكامل
            make LDFLAGS="-static"
            
            # 5. تحضير الملف النهائي للرفع
            mv proot ../proot-${{ matrix.arch }}-static

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proot-${{ matrix.arch }}-static
          path: proot-${{ matrix.arch }}-static
