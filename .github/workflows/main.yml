name: Build Static Binaries (Docker)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Setup Git
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        if [ -z "$(git tag -l)" ]; then
          git config user.email "ci@example.com"
          git config user.name "CI Bot"
          git tag -a "v0.0.1-temp" -m "Temporary tag for build"
        fi

    - name: Build in ARM64 Docker container
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: aarch64
        distro: ubuntu22.04
        githubToken: ${{ github.token }}
        run: |
          apt-get update
          apt-get install -y gcc make git libtalloc-dev libarchive-dev pkg-config
          cd src
          make clean || true
          make -j$(nproc) CFLAGS="-O2 -static" LDFLAGS="-static" PYTHON=""
          strip proot
          file proot

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: proot-static-aarch64
        path: src/proot
        if-no-files-found: error
