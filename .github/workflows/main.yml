name: Build Static Binaries (Ubuntu Fixed)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # مهم: يجلب كل الـ history والـ tags
        fetch-tags: true  # يجلب الـ tags صراحةً

    - name: Setup Git safe directory
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc-aarch64-linux-gnu \
          libc6-dev-arm64-cross \
          libtalloc-dev \
          libtalloc2 \
          python3-dev \
          python3 \
          git \
          make \
          pkg-config

    - name: Create dummy git tag if none exists
      run: |
        # التحقق من وجود tags، وإذا لا يوجد، ننشئ واحداً مؤقتاً
        if [ -z "$(git tag -l)" ]; then
          echo "No tags found, creating temporary tag..."
          git config user.email "ci@example.com"
          git config user.name "CI Bot"
          git tag -a "v0.0.1-temp" -m "Temporary tag for build"
        fi
        # التحقق من أن git describe يعمل الآن
        git describe --tags --always

    - name: Build
      run: |
        cd src
        # تعيين المتغيرات البيئية للـ cross-compilation
        export CC=aarch64-linux-gnu-gcc
        export CXX=aarch64-linux-gnu-g++
        export AR=aarch64-linux-gnu-ar
        export STRIP=aarch64-linux-gnu-strip
        
        # تنظيف أي بناء سابق
        make clean || true
        
        # البناء مع تمرير FLAGS لتجنب بعض التحذيرات
        make -j$(nproc) \
          CFLAGS="-D_FILE_OFFSET_BITS=64 -D_GNU_SOURCE -O2 -Wno-deprecated-declarations -Wno-stringop-truncation" \
          LDFLAGS="-static"

    - name: Strip binary
      run: |
        cd src
        aarch64-linux-gnu-strip proot || true
        file proot || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: proot-static-aarch64
        path: src/proot
        if-no-files-found: error
